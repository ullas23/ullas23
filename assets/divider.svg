<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 20" width="860" height="20">
  <defs>
    <style>
      .div-line {
        stroke: #00FF41;
        stroke-width: 1;
        fill: none;
        opacity: 0.6;
        animation: glowPulse 3s ease-in-out infinite;
      }
      .div-dot {
        fill: #00FF41;
        animation: glowPulse 3s ease-in-out infinite;
      }
      @keyframes glowPulse {
        0%, 100% { opacity: 0.3; filter: drop-shadow(0 0 2px #00FF41); }
        50%       { opacity: 0.9; filter: drop-shadow(0 0 6px #00FF41); }
      }
    </style>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Left line -->
  <line x1="20" y1="10" x2="400" y2="10" class="div-line" filter="url(#glow)"/>
  <!-- Center diamond -->
  <polygon points="430,4 440,10 430,16 420,10" class="div-dot" filter="url(#glow)"/>
  <!-- Right line -->
  <line x1="440" y1="10" x2="840" y2="10" class="div-line" filter="url(#glow)"/>
</svg>
