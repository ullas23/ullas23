<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 10 18" width="10" height="18">
  <defs>
    <style>
      .cur {
        fill: #00FF41;
        animation: curBlink 1s step-end infinite;
      }
      @keyframes curBlink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }
    </style>
  </defs>
  <rect x="0" y="1" width="9" height="16" rx="1" class="cur"/>
</svg>
