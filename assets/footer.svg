<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 200" width="860" height="200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&amp;display=swap');

      .f-bg { fill: #0d0d0d; }
      .f-bar { fill: #1a1a1a; }
      .f-prompt { fill: #00FF41; font-family: 'Fira Code', monospace; font-size: 13px; }
      .f-dim { fill: #4a8f5a; font-family: 'Fira Code', monospace; font-size: 13px; }
      .f-white { fill: #cccccc; font-family: 'Fira Code', monospace; font-size: 13px; }
      .f-cursor {
        fill: #00FF41;
        animation: fblink 1s step-end infinite;
      }
      @keyframes fblink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      .f-l1 { opacity: 0; animation: fIn 0.4s ease forwards; animation-delay: 0.3s; }
      .f-l2 { opacity: 0; animation: fIn 0.4s ease forwards; animation-delay: 1.0s; }
      .f-l3 { opacity: 0; animation: fIn 0.4s ease forwards; animation-delay: 1.7s; }
      .f-l4 { opacity: 0; animation: fIn 0.4s ease forwards; animation-delay: 2.3s; }
      .f-l5 { opacity: 0; animation: fIn 0.4s ease forwards; animation-delay: 2.8s; }
      @keyframes fIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }
    </style>
    <filter id="fglow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Window -->
  <rect x="10" y="10" width="840" height="180" rx="10" ry="10" class="f-bg"/>
  <rect x="10" y="10" width="840" height="180" rx="10" ry="10" fill="none" stroke="#00FF41" stroke-width="0.6" stroke-opacity="0.3"/>

  <!-- Title bar -->
  <rect x="10" y="10" width="840" height="32" rx="10" ry="10" class="f-bar"/>
  <rect x="10" y="26" width="840" height="16" class="f-bar"/>
  <circle cx="32" cy="26" r="6" fill="#ff5f57"/>
  <circle cx="52" cy="26" r="6" fill="#ffbd2e"/>
  <circle cx="72" cy="26" r="6" fill="#28c840"/>
  <text x="430" y="31" text-anchor="middle" fill="#555" font-family="'Fira Code', monospace" font-size="11px">session-logout — bash</text>
  <line x1="10" y1="42" x2="850" y2="42" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Content -->
  <g class="f-l1">
    <text x="28" y="72" class="f-prompt">❯ </text>
    <text x="46" y="72" class="f-white">logout</text>
  </g>
  <g class="f-l2">
    <text x="28" y="96" class="f-dim">Saving workspace...</text>
  </g>
  <g class="f-l3">
    <text x="28" y="116" class="f-dim">Encrypting session...</text>
  </g>
  <g class="f-l4">
    <text x="28" y="136" class="f-prompt">Workspace locked. Connection closed.</text>
  </g>
  <g class="f-l5">
    <text x="28" y="160" class="f-white">See you on the next engagement.</text>
    <rect x="28" y="167" width="8" height="14" rx="1" class="f-cursor"/>
  </g>
</svg>
