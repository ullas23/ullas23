  <text x="32" y="706" class="white" style="opacity:0;animation:fi .3s ease forwards 10.25s;">  ✓  Helped establish ROOTRON, a student-founded cybersecurity technical club</text>
  <text x="32" y="729" class="white" style="opacity:0;animation:fi .3s ease forwards 10.40s;">  ✓  Conducted workshops &amp; CTFs for the security community</text>
  <text x="32" y="752" class="white" style="opacity:0;animation:fi .3s ease forwards 10.55s;">  ✓  National Hackathon Awardee</text>

