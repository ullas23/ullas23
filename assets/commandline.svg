      <rect x="196" y="256" width="14" height="14" rx="1" fill="#d4d4d4"/>
      <rect x="215" y="256" width="14" height="14" rx="1" fill="#d4d4d4"/>
      <rect x="234" y="256" width="14" height="14" rx="1" fill="#d4d4d4"/>
      <rect x="253" y="256" width="14" height="14" rx="1" fill="#d4d4d4"/>
      <rect x="272" y="256" width="14" height="14" rx="1" fill="#d4d4d4"/>
      <rect x="291" y="256" width="14" height="14" rx="1" fill="#d4d4d4"/>
      <rect x="310" y="256" width="14" height="14" rx="1" fill="#d4d4d4"/>
