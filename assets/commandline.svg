  <rect x="10" y="28"  width="840" height="18" class="window-bar"/>
  <circle cx="36" cy="28" r="7" class="btn-red"/>
  <circle cx="58" cy="28" r="7" class="btn-yellow"/>
  <circle cx="80" cy="28" r="7" class="btn-green"/>
  <text x="430" y="33" text-anchor="middle" class="title-text">ullas23@github — bash — 80×24</text>
  <line x1="10" y1="46" x2="850" y2="46" stroke="#2a2a2a" stroke-width="1"/>

  <!-- ════ LOGIN SEQUENCE ══════════════════════════════════════ -->
