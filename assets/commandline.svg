  </g>

  <!-- Loading bar — y=256, height=14, bottom=270 -->
  <g class="l8">
    <path d="M42,256 L34,256 L34,270 L42,270"
          fill="none" stroke="#00FF41" stroke-width="2" stroke-linecap="square"/>
    <path d="M783,256 L791,256 L791,270 L783,270"
          fill="none" stroke="#00FF41" stroke-width="2" stroke-linecap="square"/>
    <g clip-path="url(#blockClip)">
      <rect x="44"  y="256" width="14" height="14" rx="1" fill="#d4d4d4"/>
      <rect x="63"  y="256" width="14" height="14" rx="1" fill="#d4d4d4"/>
      <rect x="82"  y="256" width="14" height="14" rx="1" fill="#d4d4d4"/>
      <rect x="101" y="256" width="14" height="14" rx="1" fill="#d4d4d4"/>
