<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 54" width="680" height="54">
  <defs>
    <style>
      .t-bg { fill: #0d1117; }
      .t-prompt { fill: #00FF41; font-family: 'Courier New', Courier, monospace; font-size: 14px; font-weight: 600; }
      .t-cmd { fill: #e6edf3; font-family: 'Courier New', Courier, monospace; font-size: 14px; }
      .t-cursor {
        fill: #00FF41;
        animation: tblink 1s step-end infinite;
      }
      @keyframes tblink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
    </style>
  </defs>
  <rect width="680" height="54" rx="6" class="t-bg"/>
  <text x="16" y="34" class="t-prompt">❯</text>
  <text x="30" y="34" class="t-cmd"> ullas@github:~$</text>
  <rect x="210" y="20" width="8" height="16" rx="1" class="t-cursor"/>
</svg>
